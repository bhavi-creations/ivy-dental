<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container mt-3">
        <button type="button"  class="btn btn-info">mani <span class="badge bg-primary">452</span> </button>

        <h2>Alerts</h2>
        <p>The button with class="btn-close" and data-bs-dismiss="alert" is used to close the alert box.</p>
        <p>The alert-dismissible class aligns the button to the right.</p>

        <div class="alert alert-info alert-dismissible">
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            <strong>Light!</strong> Light grey alert.
        </div>
    </div>


</body>

</html>
